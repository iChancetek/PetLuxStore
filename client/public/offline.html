<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — The PotLuxE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050510;
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(139,92,246,0.2); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(59,130,246,0.15); bottom: -80px; right: -80px; }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2.5rem;
      box-shadow: 0 0 40px rgba(139,92,246,0.4);
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #c4b5fd, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 1.1rem;
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto 2rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    a:hover { opacity: 0.9; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="icon">🐾</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your connection. Check your network and come back — your furry friends are waiting!</p>
  <a href="/" onclick="window.location.reload()">Try Again</a>
</body>
</html>
